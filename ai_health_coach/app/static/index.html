      }

      function toggleSet(exercise, setIdx) {
        // Three-state cycle per set: null -> "complete" -> "partial" -> null
        ensureSetStatuses(exercise);
        if (setIdx > 0 && !exercise.set_statuses[setIdx - 1]) return;
        var current = exercise.set_statuses[setIdx];
        var next;
        if (current === null || current === undefined) next = 'complete';
        else if (current === 'complete') next = 'partial';
        else next = null;

        var newStatuses = exercise.set_statuses.slice();
        newStatuses[setIdx] = next;
        if (next === null) {
          for (var k = setIdx + 1; k < newStatuses.length; k++) {
            newStatuses[k] = null;
          }
        }

        var newCompleted = 0;
        for (var i = 0; i < newStatuses.length; i++) {
          if (newStatuses[i] !== null && newStatuses[i] !== undefined) newCompleted++;
        }

        api.updateExercise(state.patientId, exercise.exercise_id, {
          set_statuses: newStatuses,
          sets_completed: newCompleted,
          date: completionDateForCurrentDay()
        })
          .then(function (data) {
            exercise.sets_completed = data.sets_completed;
            exercise.set_statuses = data.set_statuses || newStatuses;
            exercise.is_completed = data.completed;
            renderExerciseList();
          })
          .catch(function () { showError('Could not update exercise.'); });
      }

      function selectDifficulty(exercise, level) {
        exercise.difficulty = level;
        api.updateExercise(state.patientId, exercise.exercise_id, { difficulty: level, date: completionDateForCurrentDay() })
          .then(function () {
            renderExerciseList();
          })
          .catch(function () { showError('Could not save difficulty.'); });
      }

      function submitAdjustment(exercise, section, feedback) {
        var btn = section.querySelector('.btn-adjust');
        var resultDiv = section.querySelector('.adjust-result');
        btn.classList.add('loading');
        btn.disabled = true;

        api.adjustExercise(state.patientId, exercise.exercise_id, {
          difficulty: exercise.difficulty,
          feedback: feedback || null
        })
          .then(function (data) {
            // Show day-shifted result -- current exercise stays unchanged
            var dayLabel = 'Day ' + data.target_day;
            if (data.target_day && data.new_exercise.day_number) {
              dayLabel = 'Day ' + data.new_exercise.day_number;
            }
            var title = 'Exercise Updated on ' + dayLabel;
            var detail = '';
            if (data.target_exercise_name) {
              detail = escapeHtml(data.target_exercise_name) + ' → ' + escapeHtml(data.new_exercise.name);
            } else {
              detail = 'New: ' + escapeHtml(data.new_exercise.name);
            }
            resultDiv.innerHTML = '<div class="adjust-result-title">' + escapeHtml(title) + '</div>' +
              '<div class="adjust-result-text" style="font-weight:600;margin-bottom:4px">' + detail + '</div>' +
              '<div class="adjust-result-text">' + escapeHtml(data.reasoning) + '</div>';
            resultDiv.classList.add('visible');
            btn.style.display = 'none';
            // Do NOT replace current exercise in UI -- it stays as-is
          })
          .catch(function () {
            showError('Could not adjust exercise. Please try again.');
            btn.classList.remove('loading');
            btn.disabled = false;
          });
      }

        var todayDue = a.exercises_due_today;
        var todayDone = a.exercises_completed_today;
        var estMins = todayDue * 4;
        var progressPct = todayDue > 0 ? (todayDone / todayDue * 100) : 0;
        var actionCardHtml = '<div class="home-card home-action-card" id="homeActionCard">' +
          '<div class="home-card-label">Today\'s Exercises</div>' +
          '<div class="home-action-summary"><strong>' + todayDue + ' exercises</strong> &middot; ~' + estMins + ' mins</div>' +
          '<div class="home-progress-track"><div class="home-progress-fill" style="width:' + progressPct + '%"></div></div>' +
          '<div class="home-progress-label">' + todayDone + '/' + todayDue + ' completed</div>' +
          '<button class="btn-start-session" id="homeStartBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>' + (todayDone > 0 && todayDone < todayDue ? 'Continue Session' : todayDone >= todayDue && todayDue > 0 ? 'All Done! Review' : 'Start Session') + '</button>' +
          '</div>';

        // 4a. Daily briefing card
        var briefingCardHtml = '';
        if (state.dailyBriefing && state.dailyBriefing.message) {
          briefingCardHtml = '<div class="home-card home-briefing-card">' +
            '<div class="home-card-label">Today\'s Coach Message</div>' +
            '<div class="home-briefing-text">' + escapeHtml(state.dailyBriefing.message) + '</div>' +
            '</div>';
        }

        // 4. Coach teaser card
        var teaser = getCoachTeaser(state.phase, a.days_in_program);
        var lastMsg = '';
        for (var i = state.messages.length - 1; i >= 0; i--) {
          if (state.messages[i].role === 'coach') { lastMsg = state.messages[i].text; break; }
        }
        var previewHtml = lastMsg ? '<div class="home-coach-preview">' + escapeHtml(lastMsg) + '</div>' : '';
        var coachCardHtml = '<div class="home-card home-coach-card' + teaser.style + '" id="homeCoachCard">' +
          '<div class="home-card-label">' + teaser.label + '</div>' +
          '<div class="home-coach-teaser">' + teaser.text + '</div>' +
          previewHtml +
          '<div class="home-coach-cta">Open Chat <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></div>' +
          '</div>';

        // 5. Progress section
        var circumference = 2 * Math.PI * 58;
        var todayRate = a.exercises_due_today > 0
          ? Math.round(a.exercises_completed_today / a.exercises_due_today * 100) : 0;
        var offset = circumference - (todayRate / 100) * circumference;

        var milestoneDays = [2, 5, 7];
        var milestonesHtml = '';
        for (var m = 0; m < milestoneDays.length; m++) {
          var d = milestoneDays[m];
          var reached = a.milestones[String(d)] ? ' reached' : '';
          milestonesHtml += '<div class="milestone' + reached + '"><div class="milestone-circle">' + d + '</div><div class="milestone-label">Day ' + d + '</div></div>';
        }

        var barsHtml = '';
        for (var b = 0; b < a.daily_completions.length; b++) {
          var dc = a.daily_completions[b];
          var pct = dc.total > 0 ? (dc.completed / dc.total * 100) : 0;
          barsHtml += '<div class="bar-group"><div class="bar-track"><div class="bar-fill" style="height:' + pct + '%"></div></div><div class="bar-label">D' + dc.day + '</div></div>';
        }

        // 6. Pathway progress bar
        var pathwayHtml = '';
        if (state.pathway && state.pathway.pathway_name) {
          var pw = state.pathway;
          var segments = '';
          for (var si = 1; si <= pw.total_weeks; si++) {
            var cls = si < pw.current_week ? 'completed' : si === pw.current_week ? 'current' : '';
            segments += '<div class="pathway-segment ' + cls + '"></div>';
          }
          pathwayHtml = '<div class="home-card">' +
            '<div class="home-card-label">' + escapeHtml(pw.pathway_name) + '</div>' +
            '<div class="pathway-week-label">Week ' + pw.current_week + ' of ' + pw.total_weeks + ' — ' + escapeHtml(pw.week_theme) + '</div>' +
            '<div class="pathway-segments">' + segments + '</div>' +
            '<div class="pathway-bar-label">' + Math.round(pw.current_adherence) + '% complete · ' + Math.round(pw.advancement_threshold * 100) + '% needed to advance</div>' +
            '</div>';
        }

        // 7. PRO check-in card
        var proHtml = '';
        var proSubmitted = sessionStorage.getItem('proSubmittedToday') === new Date().toISOString().slice(0, 10);
        if (proSubmitted && state.outcomes && state.outcomes.latest) {
          var lt = state.outcomes.latest;
          proHtml = '<div class="home-card pro-card">' +
            '<div class="home-card-label">Today\'s Check-in</div>' +
            '<div class="pro-summary-pill">' +
            '<span>Pain: ' + lt.pain_score + '/10</span>' +
            '<span>Function: ' + lt.function_score + '/10</span>' +
            '<span>Wellbeing: ' + lt.wellbeing_score + '/10</span>' +
            '</div></div>';
        } else if (!proSubmitted) {
          proHtml = '<div class="home-card pro-card" id="proCard">' +
            '<div class="home-card-label">Daily Check-in</div>' +
            '<div class="pro-sliders">' +
            '<div class="pro-slider-row"><label>Pain</label><input type="range" min="0" max="10" value="5" id="proPain"><span class="pro-val" id="proPainVal">5</span></div>' +
            '<div class="pro-slider-row"><label>Function</label><input type="range" min="0" max="10" value="5" id="proFunction"><span class="pro-val" id="proFunctionVal">5</span></div>' +
            '<div class="pro-slider-row"><label>Wellbeing</label><input type="range" min="0" max="10" value="5" id="proWellbeing"><span class="pro-val" id="proWellbeingVal">5</span></div>' +
            '</div>' +
            '<textarea class="pro-notes" id="proNotes" rows="2" placeholder="Any notes? (optional)"></textarea>' +
            '<button class="pro-submit-btn" id="proSubmitBtn">Submit Check-in</button>' +
            '</div>';
        }

        // 8. PRO trend sparklines
        var proTrendHtml = '';
        if (state.outcomes && state.outcomes.reports && state.outcomes.reports.length > 1) {
          var rpts = state.outcomes.reports.slice().reverse(); // oldest first
          var painBars = '';
          var funcBars = '';
          for (var ri = 0; ri < rpts.length; ri++) {
            painBars += '<div class="spark-bar" style="height:' + (rpts[ri].pain_score * 10) + '%;background:var(--error)"></div>';
            funcBars += '<div class="spark-bar" style="height:' + (rpts[ri].function_score * 10) + '%"></div>';
          }
          var trendIcon = function (t) { return t === 'improving' ? ' ↑' : t === 'declining' ? ' ↓' : ' →'; };
          proTrendHtml = '<div class="home-card pro-trend-chart">' +
            '<div class="home-card-label">Outcome Trends</div>' +
            '<div style="display:flex;gap:16px">' +
            '<div style="flex:1"><div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px">Pain' + trendIcon(state.outcomes.pain_trend) + '</div><div class="pro-sparkline">' + painBars + '</div></div>' +
            '<div style="flex:1"><div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px">Function' + trendIcon(state.outcomes.function_trend) + '</div><div class="pro-sparkline">' + funcBars + '</div></div>' +
            '</div></div>';
        }

        homeView.innerHTML =
          greetingHtml +
          goalCardHtml +
          pathwayHtml +
          actionCardHtml +
          proHtml +
          briefingCardHtml +
          coachCardHtml +
          proTrendHtml +
          '<div class="home-section-divider"><span>Progress</span></div>' +
          '<div class="adherence-ring-container"><div class="adherence-ring"><svg viewBox="0 0 140 140"><circle class="ring-bg" cx="70" cy="70" r="58"/><circle class="ring-fg" cx="70" cy="70" r="58" stroke-dasharray="' + circumference.toFixed(1) + '" stroke-dashoffset="' + offset.toFixed(1) + '"/></svg><div class="ring-label"><div class="ring-pct">' + todayRate + '%</div><div class="ring-sub">Today</div></div></div></div>' +
          '<div class="stats-grid"><div class="stat-card"><div class="stat-value">' + a.streak + '</div><div class="stat-label">Day Streak</div></div><div class="stat-card"><div class="stat-value">' + a.total_completed + '</div><div class="stat-label">Completed</div></div><div class="stat-card"><div class="stat-value">' + Math.round(a.completion_rate) + '%</div><div class="stat-label">Overall</div></div><div class="stat-card"><div class="stat-value">' + a.current_day + '</div><div class="stat-label">Program Day</div></div></div>' +
          '<div class="milestones-section"><div class="milestones-title">Milestones</div><div class="milestones-row">' + milestonesHtml + '</div></div>' +
          '<div class="daily-chart-section"><div class="daily-chart-title">Daily Progress</div><div class="daily-bars">' + barsHtml + '</div></div>';

        // Wire up card clicks
        var goalCard = document.getElementById('homeGoalCard');
        goalCard.addEventListener('click', function (e) {
          if (e.target.closest('#homeAddGoalBtn') || e.target.closest('#homeAddGoalForm') || e.target.closest('.home-goal-add-btn')) return;
          switchTab('chat');
        });
        var homeAddGoalBtn = document.getElementById('homeAddGoalBtn');
        if (homeAddGoalBtn) {
          homeAddGoalBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            showAddGoalForm('homeAddGoalForm');
          });
        }
        document.getElementById('homeStartBtn').addEventListener('click', function (e) { e.stopPropagation(); switchTab('exercises'); });
        document.getElementById('homeActionCard').addEventListener('click', function () { switchTab('exercises'); });
        document.getElementById('homeCoachCard').addEventListener('click', function () { switchTab('chat'); });

        // PRO sliders
        var proSliders = [
          { input: 'proPain', val: 'proPainVal' },
          { input: 'proFunction', val: 'proFunctionVal' },
          { input: 'proWellbeing', val: 'proWellbeingVal' }
        ];
        for (var ps = 0; ps < proSliders.length; ps++) {
          (function (s) {
            var el = document.getElementById(s.input);
            if (el) el.addEventListener('input', function () {
              document.getElementById(s.val).textContent = el.value;
            });
          })(proSliders[ps]);
        }

        // PRO submit
        var proBtn = document.getElementById('proSubmitBtn');
        if (proBtn) {
          proBtn.addEventListener('click', function () {
            var pain = parseInt(document.getElementById('proPain').value);
            var func = parseInt(document.getElementById('proFunction').value);
            var well = parseInt(document.getElementById('proWellbeing').value);
            var notes = document.getElementById('proNotes').value || null;
            proBtn.disabled = true;
            proBtn.textContent = 'Submitting...';
            api.submitOutcome(state.patientId, {
              pain_score: pain, function_score: func, wellbeing_score: well, notes: notes
            }).then(function () {
              sessionStorage.setItem('proSubmittedToday', new Date().toISOString().slice(0, 10));
              loadHome();
            }).catch(function () {
              proBtn.disabled = false;
              proBtn.textContent = 'Submit Check-in';
              showError('Could not submit check-in.');
            });
          });
        }
      }

      function showAddGoalForm(containerId) {
        var container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML =
          '<div class="add-goal-form">' +
          '<input type="text" id="addGoalText" placeholder="Describe your goal (e.g., Walk without crutches)" autocomplete="off">' +
          '<input type="date" id="addGoalDate" placeholder="Target date (optional)">' +
          '<div class="add-goal-actions">' +
          '<button class="add-goal-save" id="addGoalSaveBtn">Save</button>' +
          '<button class="add-goal-cancel" id="addGoalCancelBtn">Cancel</button>' +
          '</div></div>';
        var textInput = document.getElementById('addGoalText');
        textInput.focus();
        textInput.addEventListener('click', function (e) { e.stopPropagation(); });
        document.getElementById('addGoalDate').addEventListener('click', function (e) { e.stopPropagation(); });
        document.getElementById('addGoalSaveBtn').addEventListener('click', function (e) {
          e.stopPropagation();
          submitNewGoal();
        });
        document.getElementById('addGoalCancelBtn').addEventListener('click', function (e) {
          e.stopPropagation();
          container.innerHTML = '';
        });
        textInput.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') { e.preventDefault(); submitNewGoal(); }
        });
      }

      function submitNewGoal() {
        var textInput = document.getElementById('addGoalText');
        var dateInput = document.getElementById('addGoalDate');
        var saveBtn = document.getElementById('addGoalSaveBtn');
        if (!textInput || !textInput.value.trim()) return;
        var goalText = textInput.value.trim();
        var targetDate = dateInput && dateInput.value ? dateInput.value : null;
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';
        api.createGoal(state.patientId, goalText, targetDate)
          .then(function () {
            return api.getGoals(state.patientId);
          })
          .then(function (goals) {
            updateGoals(goals);
          })
          .catch(function (err) {
            showError(err.status ? friendlyError(err.status) : 'Could not add goal.');
            if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
          });
      }

      // Add Goal from banner (via custom event)
      document.addEventListener('addGoalClick', function () {
        switchTab('home');
        setTimeout(function () {
          var btn = document.getElementById('homeAddGoalBtn');
          if (btn) btn.click();
        }, 100);
      });

      function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
      }

      // ─── Settings View ───
      function renderSettings() {
        var phaseLabel = state.phase.replace(/_/g, ' ');
        phaseLabel = phaseLabel.charAt(0).toUpperCase() + phaseLabel.slice(1);

        settingsView.innerHTML =
          '<div class="settings-card"><h3>Patient Information</h3>' +
          '<div class="settings-row"><span class="settings-label">Patient ID</span><span class="settings-value">' + escapeHtml(state.patientId) + '</span></div>' +
          '<div class="settings-row"><span class="settings-label">Current Phase</span><span class="phase-badge" data-phase="' + state.phase + '">' + phaseLabel + '</span></div>' +
          '<div class="settings-row"><span class="settings-label">Enrolled</span><span class="settings-value">' + (state.enrollmentDate || 'N/A') + '</span></div>' +
          '</div>' +
          '<button class="btn-logout" id="logoutBtn">Log Out</button>';

        document.getElementById('logoutBtn').addEventListener('click', function () {
          sessionStorage.clear();
          location.reload();
        });
      }

      // ─── Event listeners ───
      welcomeForm.addEventListener('submit', handleWelcome);
      messageInput.addEventListener('input', adjustTextarea);
      messageInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
      });
      sendBtn.addEventListener('click', handleSend);

      // Hash router
      function handleHash() {
        var hash = window.location.hash.replace('#', '');
        if (hash && VIEW_TITLES[hash] && state.screen === 'app') {
          switchTab(hash);
        }
      }
      window.addEventListener('hashchange', handleHash);

      // ─── Session restore ───
      var savedId = sessionStorage.getItem('healthCoachPatientId');
      if (savedId) {
        patientIdInput.value = savedId;
      }
    })();
  </script>
</body>
</html>
