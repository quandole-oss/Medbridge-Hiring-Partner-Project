      function getExerciseSvg(name) {
        var lower = name.toLowerCase();
        if (lower.indexOf('ankle') !== -1) return exerciseSvgs.ankle;
        if (lower.indexOf('quad set') !== -1) return exerciseSvgs.quad_set;
        if (lower.indexOf('heel slide') !== -1) return exerciseSvgs.heel_slide;
        if (lower.indexOf('hamstring') !== -1) return exerciseSvgs.hamstring;
        if (lower.indexOf('calf') !== -1) return exerciseSvgs.calf;
        if (lower.indexOf('leg raise') !== -1 || lower.indexOf('straight leg') !== -1) return exerciseSvgs.leg_raise;
        if (lower.indexOf('bridge') !== -1 || lower.indexOf('glute') !== -1) return exerciseSvgs.bridge;
        if (lower.indexOf('hip abduction') !== -1) return exerciseSvgs.hip_abduction;
        if (lower.indexOf('balance') !== -1 || lower.indexOf('heel-to-toe') !== -1 || lower.indexOf('heel to toe') !== -1) return exerciseSvgs.balance;
        if (lower.indexOf('squat') !== -1 || lower.indexOf('wall squat') !== -1) return exerciseSvgs.squat;
        if (lower.indexOf('step') !== -1) return exerciseSvgs.step_up;
        if (lower.indexOf('piriformis') !== -1 || lower.indexOf('stretch') !== -1) return exerciseSvgs.stretch;
        return exerciseSvgs.stretch;
      }

      function getExerciseMetaText(ex) {
        if (ex.hold_seconds) {
          var text = 'Hold ' + ex.hold_seconds + 's';
          if (ex.sets > 1) text += ' x' + ex.sets;
          return text;
        }
        if (ex.sets && ex.reps) return ex.sets + 'x' + ex.reps;
        return '';
      }

      // ─── Exercises View ───
      function renderDaySelector() {
        daySelector.innerHTML = '';
        for (var d = 1; d <= state.totalDays; d++) {
          var pill = document.createElement('button');
          pill.className = 'day-pill';
          if (d === state.currentDay) pill.classList.add('active');
          if (d > state.adherence?.current_day && state.adherence) pill.classList.add('disabled');
          pill.innerHTML = '<span class="day-num">' + d + '</span>Day';
          pill.setAttribute('data-day', d);
          pill.addEventListener('click', (function (day) {
            return function () {
              state.currentDay = day;
              renderDaySelector();
              loadExercisesForDay(day);
            };
          })(d));
          daySelector.appendChild(pill);
        }
      }

      function loadExercises() {
        api.getAdherence(state.patientId)
          .then(function (data) {
            state.adherence = data;
            state.currentDay = data.current_day;
            renderDaySelector();
            return loadExercisesForDay(state.currentDay);
          })
          .catch(function (err) {
            showError('Could not load exercises.');
          });
      }

      function loadExercisesForDay(day) {
        return api.getExercises(state.patientId, day)
          .then(function (data) {
            state.exercises = data.exercises;
            renderExerciseList();
          })
          .catch(function () {
            showError('Could not load exercises for this day.');
          });
      }

      function renderExerciseList() {
        exerciseList.innerHTML = '';
        if (!state.exercises.length) {
          exerciseList.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/></svg><p>No exercises for this day yet.</p></div>';
          return;
        }

        for (var i = 0; i < state.exercises.length; i++) {
          var ex = state.exercises[i];
          exerciseList.appendChild(buildExerciseCard(ex));
        }
      }

      function ensureSetStatuses(ex) {
        // Backward compat: synthesize set_statuses from sets_completed if missing
        if (!ex.set_statuses) {
          ex.set_statuses = [];
          for (var i = 0; i < ex.sets; i++) {
            ex.set_statuses.push(i < ex.sets_completed ? 'complete' : null);
          }
        }
      }

      function buildExerciseCard(ex) {
        ensureSetStatuses(ex);
        var isExpanded = state.expandedExerciseId === ex.exercise_id;
        var allDone = ex.sets_completed >= ex.sets && ex.sets > 0;

        var card = document.createElement('div');
        card.className = 'exercise-card';
        if (isExpanded) card.classList.add('expanded');
        if (allDone) card.classList.add('all-sets-done');

        // ── Header (collapsed view) ──
        var header = document.createElement('div');
        header.className = 'exercise-card-header';
        header.addEventListener('click', (function (eid) {
          return function () {
            state.expandedExerciseId = state.expandedExerciseId === eid ? null : eid;
            renderExerciseList();
          };
        })(ex.exercise_id));

        // Small SVG
        var svgSmall = document.createElement('div');
        svgSmall.className = 'exercise-svg-small';
        svgSmall.innerHTML = getExerciseSvg(ex.name);

        // Header info
        var headerInfo = document.createElement('div');
        headerInfo.className = 'exercise-header-info';

        var nameEl = document.createElement('div');
        nameEl.className = 'exercise-name';
        nameEl.textContent = ex.name;

        var headerMeta = document.createElement('div');
        headerMeta.className = 'exercise-header-meta';

        var bodyBadge = document.createElement('span');
        bodyBadge.className = 'exercise-badge body-part';
        bodyBadge.textContent = ex.body_part;
        headerMeta.appendChild(bodyBadge);

        var metaText = getExerciseMetaText(ex);
        if (metaText) {
          var metaSpan = document.createElement('span');
          metaSpan.textContent = metaText;
          headerMeta.appendChild(document.createTextNode(' \u00B7 '));
          headerMeta.appendChild(metaSpan);
        }

        // Progress dots (driven by set_statuses)
        var dotsContainer = document.createElement('div');
        dotsContainer.className = 'exercise-progress-dots';
        for (var s = 0; s < ex.sets; s++) {
          var dot = document.createElement('div');
          dot.className = 'progress-dot';
          var status = ex.set_statuses[s];
          if (status === 'complete') dot.classList.add('filled');
          else if (status === 'partial') dot.classList.add('partial');
          dotsContainer.appendChild(dot);
        }
        var dotLabel = document.createElement('span');
        dotLabel.className = 'progress-dot-label';
        dotLabel.textContent = ex.sets_completed + '/' + ex.sets + ' sets';
        dotsContainer.appendChild(dotLabel);

        headerInfo.appendChild(nameEl);
        headerInfo.appendChild(headerMeta);
        headerInfo.appendChild(dotsContainer);

        // Chevron
        var chevron = document.createElement('div');
        chevron.className = 'exercise-chevron';
        chevron.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>';

        header.appendChild(svgSmall);
        header.appendChild(headerInfo);
        header.appendChild(chevron);
        card.appendChild(header);

        // ── Expanded content ──
        var expand = document.createElement('div');
        expand.className = 'exercise-expand';

        // Large SVG
        var svgLarge = document.createElement('div');
        svgLarge.className = 'exercise-svg-large';
        svgLarge.innerHTML = getExerciseSvg(ex.name);

        // Structured instructions
        var instructions = [
          { key: 'setup_instructions',  label: 'Setup',          cls: '' },
          { key: 'execution_steps',     label: 'Execution',      cls: '' },
          { key: 'form_cues',           label: 'Form Cues',      cls: '' },
          { key: 'common_mistakes',     label: 'Avoid',          cls: 'instruction-mistake' }
        ];
        // Fallback: if new fields absent, use legacy description
        var hasStructured = ex.setup_instructions || ex.execution_steps || ex.form_cues || ex.common_mistakes;

        expand.appendChild(svgLarge);

        if (hasStructured) {
          for (var k = 0; k < instructions.length; k++) {
            var inst = instructions[k];
            var val = ex[inst.key];
            if (!val) continue;
            var block = document.createElement('div');
            block.className = 'instruction-block' + (inst.cls ? ' ' + inst.cls : '');
            var title = document.createElement('div');
            title.className = 'instruction-title';
            title.textContent = inst.label;
            var text = document.createElement('p');
            text.className = 'instruction-text';
            text.textContent = val;
            block.appendChild(title);
            block.appendChild(text);
            expand.appendChild(block);
          }
        } else {
          var descEl = document.createElement('div');
          descEl.className = 'exercise-desc';
          descEl.textContent = ex.description || '';
          expand.appendChild(descEl);
        }

        // Divider
        var div1 = document.createElement('div');
        div1.className = 'exercise-divider';
        expand.appendChild(div1);

        // Set checkboxes (three-state: empty -> complete -> partial -> empty)
        var setSection = document.createElement('div');
        setSection.className = 'set-checkboxes';
        for (var j = 0; j < ex.sets; j++) {
          var setBox = document.createElement('div');
          setBox.className = 'set-checkbox';
          var setLabel = document.createElement('span');
          setLabel.className = 'set-checkbox-label';
          setLabel.textContent = 'Set ' + (j + 1);
          var setBtn = document.createElement('button');
          setBtn.className = 'set-check-btn';
          var setStatus = ex.set_statuses[j];
          if (setStatus === 'complete') setBtn.classList.add('checked');
          else if (setStatus === 'partial') setBtn.classList.add('partial');
          setBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
          setBtn.setAttribute('aria-label', 'Toggle set ' + (j + 1));
          setBtn.addEventListener('click', (function (exercise, setIdx) {
            return function (e) {
              e.stopPropagation();
              toggleSet(exercise, setIdx);
            };
          })(ex, j));
          setBox.appendChild(setLabel);
          setBox.appendChild(setBtn);
          setSection.appendChild(setBox);
        }
        expand.appendChild(setSection);

        // Difficulty section (visible if at least 1 set attempted)
        if (ex.sets_completed > 0) {
          var div2 = document.createElement('div');
          div2.className = 'exercise-divider';
          expand.appendChild(div2);

          var diffSection = document.createElement('div');
          diffSection.className = 'difficulty-section';
          var diffLabel = document.createElement('div');
          diffLabel.className = 'difficulty-label';
          diffLabel.textContent = 'How was this exercise?';
          diffSection.appendChild(diffLabel);

          var pills = document.createElement('div');
          pills.className = 'difficulty-pills';

          var difficulties = [
            { value: 'too_easy', label: 'Too Easy', activeClass: 'active-easy' },
            { value: 'just_right', label: 'Just Right', activeClass: 'active-right' },
            { value: 'too_hard', label: 'Too Hard', activeClass: 'active-hard' }
          ];
          for (var d = 0; d < difficulties.length; d++) {
            var diff = difficulties[d];
            var pill = document.createElement('button');
            pill.className = 'difficulty-pill';
            if (ex.difficulty === diff.value) pill.classList.add(diff.activeClass);
            pill.textContent = diff.label;
            pill.addEventListener('click', (function (exercise, diffValue) {
              return function (e) {
                e.stopPropagation();
                selectDifficulty(exercise, diffValue);
              };
            })(ex, diff.value));
            pills.appendChild(pill);
          }
          diffSection.appendChild(pills);
          expand.appendChild(diffSection);

          // Feedback section (if too_hard and sets incomplete, or too_easy and fully complete)
          var showFeedback = (ex.difficulty === 'too_hard' && ex.sets_completed < ex.sets) ||
                            (ex.difficulty === 'too_easy') ||
                            (ex.difficulty === 'too_hard');
          if (showFeedback) {
            var fbSection = document.createElement('div');
            fbSection.className = 'feedback-section visible';

            if (ex.difficulty === 'too_hard') {
              var fbTextarea = document.createElement('textarea');
              fbTextarea.className = 'feedback-textarea';
              fbTextarea.placeholder = "What made it difficult? (e.g., knee pain, too many reps)";
              fbTextarea.value = ex.feedback || '';
              fbTextarea.addEventListener('click', function (e) { e.stopPropagation(); });
              fbSection.appendChild(fbTextarea);
            }

            var adjustBtn = document.createElement('button');
            adjustBtn.className = 'btn-adjust';
            adjustBtn.innerHTML = '<span class="adjust-spinner"></span><span class="adjust-text">Adjust My Exercise</span>';
            adjustBtn.addEventListener('click', (function (exercise, section) {
              return function (e) {
                e.stopPropagation();
                var textarea = section.querySelector('.feedback-textarea');
                var feedbackVal = textarea ? textarea.value : null;
                submitAdjustment(exercise, section, feedbackVal);
              };
            })(ex, fbSection));
            fbSection.appendChild(adjustBtn);

            // Result placeholder
            var resultDiv = document.createElement('div');
            resultDiv.className = 'adjust-result';
            fbSection.appendChild(resultDiv);

            expand.appendChild(fbSection);
          }
        }

        card.appendChild(expand);
        return card;
      }

      function toggleSet(exercise, setIdx) {
        // Three-state cycle per set: null -> "complete" -> "partial" -> null
        ensureSetStatuses(exercise);
        var current = exercise.set_statuses[setIdx];
        var next;
        if (current === null || current === undefined) next = 'complete';
        else if (current === 'complete') next = 'partial';
        else next = null;

        var newStatuses = exercise.set_statuses.slice();
        newStatuses[setIdx] = next;

        var newCompleted = 0;
        for (var i = 0; i < newStatuses.length; i++) {
          if (newStatuses[i] !== null && newStatuses[i] !== undefined) newCompleted++;
        }

        api.updateExercise(state.patientId, exercise.exercise_id, {
          set_statuses: newStatuses,
          sets_completed: newCompleted
        })
          .then(function (data) {
            exercise.sets_completed = data.sets_completed;
            exercise.set_statuses = data.set_statuses || newStatuses;
            exercise.is_completed = data.completed;
            renderExerciseList();
          })
          .catch(function () { showError('Could not update exercise.'); });
      }

      function selectDifficulty(exercise, level) {
        exercise.difficulty = level;
        api.updateExercise(state.patientId, exercise.exercise_id, { difficulty: level })
          .then(function () {
            renderExerciseList();
          })
          .catch(function () { showError('Could not save difficulty.'); });
      }

      function submitAdjustment(exercise, section, feedback) {
        var btn = section.querySelector('.btn-adjust');
        var resultDiv = section.querySelector('.adjust-result');
        btn.classList.add('loading');
        btn.disabled = true;

        api.adjustExercise(state.patientId, exercise.exercise_id, {
          difficulty: exercise.difficulty,
          feedback: feedback || null
        })
          .then(function (data) {
            // Show day-shifted result -- current exercise stays unchanged
            var dayLabel = 'Day ' + data.target_day;
            if (data.target_day && data.new_exercise.day_number) {
              dayLabel = 'Day ' + data.new_exercise.day_number;
            }
            var title = 'Exercise Updated on ' + dayLabel;
            var detail = '';
            if (data.target_exercise_name) {
              detail = escapeHtml(data.target_exercise_name) + ' → ' + escapeHtml(data.new_exercise.name);
            } else {
              detail = 'New: ' + escapeHtml(data.new_exercise.name);
            }
            resultDiv.innerHTML = '<div class="adjust-result-title">' + escapeHtml(title) + '</div>' +
              '<div class="adjust-result-text" style="font-weight:600;margin-bottom:4px">' + detail + '</div>' +
              '<div class="adjust-result-text">' + escapeHtml(data.reasoning) + '</div>';
            resultDiv.classList.add('visible');
            btn.style.display = 'none';
            // Do NOT replace current exercise in UI -- it stays as-is
          })
          .catch(function () {
            showError('Could not adjust exercise. Please try again.');
            btn.classList.remove('loading');
            btn.disabled = false;
          });
      }

      // ─── Home View ───
      function getTimeGreeting() {
        var h = new Date().getHours();
        if (h < 12) return 'Good Morning';
        if (h < 17) return 'Good Afternoon';
        return 'Good Evening';
      }

      function getCoachTeaser(phase, daysInProgram) {
        switch (phase) {
          case 'onboarding':
            return { text: 'Your AI Health Coach is ready to help you set your recovery goals.', style: '', label: 'Get Started' };
          case 'active':
            if (daysInProgram === 2)
              return { text: 'Two days in! Your coach wants to celebrate your progress.', style: ' phase-celebration', label: 'Celebration' };
            if (daysInProgram === 5)
              return { text: 'Day 5 check-in time. Your coach has some tips for you.', style: ' phase-nudge', label: 'Check-in' };
            if (daysInProgram >= 7)
              return { text: 'One week milestone! Tap to review your journey with your coach.', style: ' phase-celebration', label: 'Milestone' };
            return { text: 'Your coach is here to answer questions and keep you on track.', style: '', label: 'AI Coach' };
          case 'dormant':
            return { text: 'We noticed you\'ve been away. Your coach is ready to help you get back on track.', style: ' phase-dormant', label: 'Welcome Back' };
          case 're_engaging':
            return { text: 'Great to see you again! Your coach has a plan to ease you back in.', style: ' phase-nudge', label: 'Re-engaging' };
          default:
            return { text: 'Your AI Health Coach is here to support your recovery.', style: '', label: 'AI Coach' };
        }
      }

      function loadHome() {
        api.getAdherence(state.patientId)
          .then(function (data) {
            state.adherence = data;
            renderHome();
          })
          .catch(function () { showError('Could not load dashboard.'); });
      }

      function renderHome() {
        var a = state.adherence;
        if (!a) return;

        // 1. Greeting header
        var streakHtml = a.streak > 0
          ? '<div class="home-streak"><svg viewBox="0 0 24 24" width="14" height="14" fill="var(--gold)" stroke="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' + a.streak + ' day streak</div>'
          : '';
        var greetingHtml = '<div class="home-greeting"><h2>' + getTimeGreeting() + ', ' + escapeHtml(state.patientId) + '</h2><div class="home-program">Post-Op Rehabilitation Program</div>' + streakHtml + '</div>';

        // 2. Goal card
        var goalCardHtml;
        if (state.currentGoal) {
          goalCardHtml = '<div class="home-card home-goal-card" id="homeGoalCard"><div class="home-card-label">Your Recovery Goal</div><div class="home-goal-text">' + escapeHtml(state.currentGoal) + '</div></div>';
        } else {
          goalCardHtml = '<div class="home-card home-goal-card" id="homeGoalCard"><div class="home-card-label">Your Recovery Goal</div><div class="home-goal-cta">Tap here to set your recovery goal with your AI Coach <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></div></div>';
        }

        // 3. Action plan card
        var todayDue = a.exercises_due_today;
        var todayDone = a.exercises_completed_today;
        var estMins = todayDue * 4;
        var progressPct = todayDue > 0 ? (todayDone / todayDue * 100) : 0;
        var actionCardHtml = '<div class="home-card home-action-card" id="homeActionCard">' +
          '<div class="home-card-label">Today\'s Exercises</div>' +
          '<div class="home-action-summary"><strong>' + todayDue + ' exercises</strong> &middot; ~' + estMins + ' mins</div>' +
          '<div class="home-progress-track"><div class="home-progress-fill" style="width:' + progressPct + '%"></div></div>' +
          '<div class="home-progress-label">' + todayDone + '/' + todayDue + ' completed</div>' +
          '<button class="btn-start-session" id="homeStartBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>' + (todayDone > 0 && todayDone < todayDue ? 'Continue Session' : todayDone >= todayDue && todayDue > 0 ? 'All Done! Review' : 'Start Session') + '</button>' +
          '</div>';

        // 4. Coach teaser card
        var teaser = getCoachTeaser(state.phase, a.days_in_program);
        var lastMsg = '';
        for (var i = state.messages.length - 1; i >= 0; i--) {
          if (state.messages[i].role === 'coach') { lastMsg = state.messages[i].text; break; }
        }
        var previewHtml = lastMsg ? '<div class="home-coach-preview">' + escapeHtml(lastMsg) + '</div>' : '';
        var coachCardHtml = '<div class="home-card home-coach-card' + teaser.style + '" id="homeCoachCard">' +
          '<div class="home-card-label">' + teaser.label + '</div>' +
          '<div class="home-coach-teaser">' + teaser.text + '</div>' +
          previewHtml +
          '<div class="home-coach-cta">Open Chat <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></div>' +
          '</div>';

        // 5. Progress section
        var circumference = 2 * Math.PI * 58;
        var offset = circumference - (a.completion_rate / 100) * circumference;

        var milestoneDays = [2, 5, 7];
        var milestonesHtml = '';
        for (var m = 0; m < milestoneDays.length; m++) {
          var d = milestoneDays[m];
          var reached = a.milestones[String(d)] ? ' reached' : '';
          milestonesHtml += '<div class="milestone' + reached + '"><div class="milestone-circle">' + d + '</div><div class="milestone-label">Day ' + d + '</div></div>';
        }

        var barsHtml = '';
        for (var b = 0; b < a.daily_completions.length; b++) {
          var dc = a.daily_completions[b];
          var pct = dc.total > 0 ? (dc.completed / dc.total * 100) : 0;
          barsHtml += '<div class="bar-group"><div class="bar-track"><div class="bar-fill" style="height:' + pct + '%"></div></div><div class="bar-label">D' + dc.day + '</div></div>';
        }

        homeView.innerHTML =
          greetingHtml +
          goalCardHtml +
          actionCardHtml +
          coachCardHtml +
          '<div class="home-section-divider"><span>Progress</span></div>' +
          '<div class="adherence-ring-container"><div class="adherence-ring"><svg viewBox="0 0 140 140"><circle class="ring-bg" cx="70" cy="70" r="58"/><circle class="ring-fg" cx="70" cy="70" r="58" stroke-dasharray="' + circumference.toFixed(1) + '" stroke-dashoffset="' + offset.toFixed(1) + '"/></svg><div class="ring-label"><div class="ring-pct">' + Math.round(a.completion_rate) + '%</div><div class="ring-sub">Completion</div></div></div></div>' +
          '<div class="stats-grid"><div class="stat-card"><div class="stat-value">' + a.streak + '</div><div class="stat-label">Day Streak</div></div><div class="stat-card"><div class="stat-value">' + a.total_completed + '</div><div class="stat-label">Completed</div></div><div class="stat-card"><div class="stat-value">' + Math.round(a.completion_rate) + '%</div><div class="stat-label">Rate</div></div><div class="stat-card"><div class="stat-value">' + a.current_day + '</div><div class="stat-label">Program Day</div></div></div>' +
          '<div class="milestones-section"><div class="milestones-title">Milestones</div><div class="milestones-row">' + milestonesHtml + '</div></div>' +
          '<div class="daily-chart-section"><div class="daily-chart-title">Daily Progress</div><div class="daily-bars">' + barsHtml + '</div></div>';

        // Wire up card clicks
        document.getElementById('homeGoalCard').addEventListener('click', function () { switchTab('chat'); });
        document.getElementById('homeStartBtn').addEventListener('click', function (e) { e.stopPropagation(); switchTab('exercises'); });
        document.getElementById('homeActionCard').addEventListener('click', function () { switchTab('exercises'); });
        document.getElementById('homeCoachCard').addEventListener('click', function () { switchTab('chat'); });
      }

      function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
      }

      // ─── Settings View ───
      function renderSettings() {
        var phaseLabel = state.phase.replace(/_/g, ' ');
        phaseLabel = phaseLabel.charAt(0).toUpperCase() + phaseLabel.slice(1);

        settingsView.innerHTML =
          '<div class="settings-card"><h3>Patient Information</h3>' +
          '<div class="settings-row"><span class="settings-label">Patient ID</span><span class="settings-value">' + escapeHtml(state.patientId) + '</span></div>' +
          '<div class="settings-row"><span class="settings-label">Current Phase</span><span class="phase-badge" data-phase="' + state.phase + '">' + phaseLabel + '</span></div>' +
          '<div class="settings-row"><span class="settings-label">Enrolled</span><span class="settings-value">' + (state.enrollmentDate || 'N/A') + '</span></div>' +
          '</div>' +
          '<button class="btn-logout" id="logoutBtn">Log Out</button>';

        document.getElementById('logoutBtn').addEventListener('click', function () {
          sessionStorage.clear();
          location.reload();
        });
      }

      // ─── Event listeners ───
      welcomeForm.addEventListener('submit', handleWelcome);
      messageInput.addEventListener('input', adjustTextarea);
      messageInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
      });
      sendBtn.addEventListener('click', handleSend);

      // Hash router
      function handleHash() {
        var hash = window.location.hash.replace('#', '');
        if (hash && VIEW_TITLES[hash] && state.screen === 'app') {
          switchTab(hash);
        }
      }
      window.addEventListener('hashchange', handleHash);

      // ─── Session restore ───
      var savedId = sessionStorage.getItem('healthCoachPatientId');
      if (savedId) {
        patientIdInput.value = savedId;
      }
    })();
  </script>
</body>
</html>
